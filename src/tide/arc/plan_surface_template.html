<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>доска · план вглубь</title>
<style>
  :root{
    --bg:#0a1418; --bg-2:#0d1b20; --card:#112127; --line:#1e3a42; --line-2:#2a4d57;
    --ink:#e9f3f1; --dim:#9db8b6; --faint:#5f7d7c;
    --teal:#35d6c2; --amber:#f4b840; --green:#5fd39a;
    --mono:ui-monospace,"SF Mono","JetBrains Mono",Menlo,monospace;
  }
  @media (prefers-color-scheme: light){
    :root{ --bg:#f3f7f6; --bg-2:#fff; --card:#fff; --line:#dde9e7; --line-2:#c6dcd8;
      --ink:#12262a; --dim:#456; --faint:#7c9a98; --teal:#0f9e8f; --amber:#b5820e; --green:#1c9a63; }
  }
  :root[data-theme="light"]{ --bg:#f3f7f6; --bg-2:#fff; --card:#fff; --line:#dde9e7; --line-2:#c6dcd8;
    --ink:#12262a; --dim:#456; --faint:#7c9a98; --teal:#0f9e8f; --amber:#b5820e; --green:#1c9a63; }
  :root[data-theme="dark"]{ --bg:#0a1418; --bg-2:#0d1b20; --card:#112127; --line:#1e3a42; --line-2:#2a4d57;
    --ink:#e9f3f1; --dim:#9db8b6; --faint:#5f7d7c; --teal:#35d6c2; --amber:#f4b840; --green:#5fd39a; }
  *{box-sizing:border-box}
  #plan{ background:radial-gradient(900px 480px at 88% -10%, color-mix(in oklab, var(--teal) 10%, transparent), transparent 60%), var(--bg);
    color:var(--ink); font-family:var(--mono); line-height:1.5; min-height:100vh; padding:26px 18px 60px; -webkit-font-smoothing:antialiased; }
  #plan .wrap{ max-width:720px; margin:0 auto; }
  #plan .eyebrow{ font-size:10.5px; letter-spacing:.22em; text-transform:uppercase; color:var(--faint); display:flex; align-items:center; gap:8px; }
  #plan .eyebrow .dot{ width:7px; height:7px; border-radius:50%; background:var(--teal); box-shadow:0 0 0 4px color-mix(in oklab, var(--teal) 18%, transparent); }
  #plan h1{ font-size:24px; line-height:1.2; letter-spacing:-.01em; margin:12px 0 6px; text-wrap:balance; font-weight:600; }
  #plan .purpose{ font-size:13.5px; color:var(--dim); margin:0 0 4px; max-width:56ch; }
  #plan .where{ font-size:12.5px; color:var(--faint); border-left:2px solid var(--line-2); padding:2px 0 2px 12px; margin:18px 0 4px; }
  #plan h2{ font-size:11px; letter-spacing:.18em; text-transform:uppercase; color:var(--faint); margin:34px 0 14px; display:flex; align-items:center; gap:9px; }
  #plan h2 .ic{ width:15px; height:15px; color:var(--teal); flex:none; }
  #plan .spine{ display:flex; flex-direction:column; }
  #plan .step{ position:relative; padding:0 0 16px 34px; }
  #plan .step:not(:last-child)::before{ content:""; position:absolute; left:11px; top:24px; bottom:-2px; width:2px; background:var(--line); }
  #plan .step .mark{ position:absolute; left:0; top:2px; width:23px; height:23px; border-radius:50%; display:grid; place-items:center;
    background:var(--card); border:1.5px solid var(--line-2); color:var(--faint); }
  #plan .step.done .mark{ border-color:var(--green); color:var(--green); }
  #plan .step.now .mark{ border-color:var(--teal); color:var(--teal); box-shadow:0 0 0 5px color-mix(in oklab, var(--teal) 14%, transparent); }
  #plan .step .mark svg{ width:13px; height:13px; }
  #plan .step .head{ display:flex; align-items:baseline; gap:9px; flex-wrap:wrap; }
  #plan .step .t{ font-size:14.5px; color:var(--ink); font-weight:600; }
  #plan .step.done .t{ color:var(--dim); font-weight:500; }
  #plan .chip{ font-size:9.5px; letter-spacing:.1em; text-transform:uppercase; padding:2px 7px; border-radius:99px; border:1px solid var(--line-2); color:var(--faint); }
  #plan .chip.now{ color:var(--teal); border-color:var(--teal); }
  #plan .chip.done{ color:var(--green); border-color:color-mix(in oklab,var(--green) 55%,transparent); }
  #plan .step .depth{ margin:8px 0 0; padding:0; list-style:none; display:flex; flex-direction:column; gap:5px; }
  #plan .step .depth li{ font-size:12.5px; color:var(--dim); padding-left:15px; position:relative; }
  #plan .step .depth li::before{ content:""; position:absolute; left:2px; top:9px; width:5px; height:5px; border-radius:50%; background:var(--line-2); }
  #plan .step .dep{ font-size:10.5px; color:var(--faint); margin-top:7px; }
  #plan .decisions{ display:flex; flex-direction:column; gap:10px; }
  #plan .dec{ background:linear-gradient(160deg, color-mix(in oklab,var(--amber) 7%,transparent), transparent 70%), var(--card);
    border:1px solid color-mix(in oklab,var(--amber) 34%, var(--line)); border-radius:12px; padding:13px 15px; }
  #plan .dec .q{ font-size:13.5px; color:var(--ink); font-weight:600; display:flex; gap:8px; align-items:baseline; }
  #plan .dec .q .qm{ color:var(--amber); flex:none; }
  #plan .dec .opts{ font-size:12px; color:var(--dim); margin-top:6px; }
  #plan .nextmove{ margin-top:30px; background:linear-gradient(160deg, color-mix(in oklab,var(--teal) 12%,transparent), transparent 72%), var(--card);
    border:1px solid var(--teal); border-radius:14px; padding:16px 18px; display:flex; gap:14px; align-items:flex-start; }
  #plan .nextmove .ic{ width:20px; height:20px; color:var(--teal); flex:none; margin-top:2px; }
  #plan .nextmove .lbl{ font-size:10px; letter-spacing:.18em; text-transform:uppercase; color:var(--teal); }
  #plan .nextmove .m{ font-size:14.5px; color:var(--ink); margin-top:3px; font-weight:600; text-wrap:balance; }
  #plan .foot{ margin-top:36px; padding-top:14px; border-top:1px solid var(--line); font-size:10.5px; color:var(--faint); display:flex; justify-content:space-between; gap:10px; flex-wrap:wrap; }
  /* показ — the channel: things the agent puts here for the human to see */
  #plan .shows{ display:flex; flex-direction:column; gap:11px; }
  #plan .show{ background:var(--card); border:1px solid var(--line); border-radius:12px; padding:13px 15px; }
  #plan .show .sh{ display:flex; align-items:baseline; gap:8px; font-size:13px; font-weight:600; color:var(--ink); }
  #plan .show .sh .k{ font-size:9px; letter-spacing:.12em; text-transform:uppercase; color:var(--teal); border:1px solid color-mix(in oklab,var(--teal) 45%,transparent); border-radius:99px; padding:1px 7px; }
  #plan .show .body{ font-size:12.5px; color:var(--dim); margin-top:6px; }
  #plan .show .fig{ margin-top:11px; overflow-x:auto; }
  #plan .show .fig svg{ max-width:100%; height:auto; display:block; }
</style>

<div id="plan"><div class="wrap" id="root"></div></div>

<script>
const PLAN = __PLAN_JSON__;
const esc = s => String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const ARROW = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M13 6l6 6-6 6"/></svg>';
const CHECK = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M20 6L9 17l-5-5"/></svg>';
const DOT   = '<svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="5"/></svg>';
const QM    = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M9.1 9a3 3 0 0 1 5.8 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12" y2="17"/></svg>';
const CHIP = { done:"готово", now:"сейчас", next:"дальше" };

function stepHTML(s){
  const mark = s.status==="done"?CHECK : s.status==="now"?DOT : "";
  const chip = '<span class="chip '+(s.status||"")+'">'+esc(CHIP[s.status]||"дальше")+'</span>';
  const depth = (s.depth||[]).map(d=>'<li>'+esc(d)+'</li>').join("");
  const dep = s.dep?'<div class="dep">зависит от: '+esc(s.dep)+'</div>':"";
  return '<div class="step '+(s.status||"")+'"><span class="mark">'+mark+'</span>'+
    '<div class="head"><span class="t">'+esc(s.title)+'</span>'+chip+'</div>'+
    (depth?'<ul class="depth">'+depth+'</ul>':"")+dep+'</div>';
}
function decHTML(d){
  return '<div class="dec"><div class="q"><span class="qm">?</span> '+esc(d.q)+'</div>'+
    '<div class="opts">'+esc(d.opts)+'</div></div>';
}

const root = document.getElementById("root");
let h = '<div class="eyebrow"><span class="dot"></span> '+esc(PLAN.eyebrow||"доска · план")+'</div>';
h += '<h1>'+esc(PLAN.title)+'</h1>';
if(PLAN.purpose) h += '<p class="purpose">'+esc(PLAN.purpose)+'</p>';
if(PLAN.where) h += '<div class="where">где мы · '+esc(PLAN.where)+'</div>';
const EYE = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>';
if((PLAN.shows||[]).length){
  h += '<h2><span class="ic">'+EYE+'</span> Показ — что я тебе показываю</h2>';
  h += '<div class="shows">'+PLAN.shows.map(s=>(
    '<div class="show"><div class="sh"><span class="k">'+esc(s.kind||"note")+'</span>'+esc(s.title||"")+'</div>'+
    (s.body?'<div class="body">'+esc(s.body)+'</div>':"")+
    (s.svg?'<div class="fig">'+s.svg+'</div>':"")+  // svg is trusted agent-authored markup
    '</div>'
  )).join("")+'</div>';
}
h += '<h2><span class="ic">'+ARROW+'</span> План — путь вглубь</h2>';
h += '<div class="spine">'+(PLAN.steps||[]).map(stepHTML).join("")+'</div>';
if((PLAN.decisions||[]).length){
  h += '<h2><span class="ic">'+QM+'</span> Открытые решения — твой ход</h2>';
  h += '<div class="decisions">'+PLAN.decisions.map(decHTML).join("")+'</div>';
}
if(PLAN.next){
  h += '<div class="nextmove"><span class="ic">'+ARROW+'</span><div><div class="lbl">следующий ход</div>'+
    '<div class="m">'+esc(PLAN.next)+'</div></div></div>';
}
h += '<div class="foot"><span>доска · план вглубь по одной теме</span><span>тема: '+esc(PLAN.topic||"")+'</span></div>';
root.innerHTML = h;
</script>
